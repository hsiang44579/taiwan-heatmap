<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股熱力圖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#f5f0e6;
  color:#2c2415;
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  min-height:100vh;
  padding:20px 16px 36px;
}
#app{max-width:1280px;margin:0 auto}

/* Header */
.hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  padding-bottom:14px;border-bottom:1px solid #d4c9b0;margin-bottom:14px;
}
.hdr-title{font-size:20px;font-weight:600;letter-spacing:-.01em;color:#1a1208}
.hdr-sub{font-size:12px;color:#9a8a70;margin-top:4px;line-height:1.6}
.hdr-stat{font-size:12px;color:#9a8a70;text-align:right;line-height:1.9;white-space:nowrap}

/* Controls */
.ctrl-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:#ede7d9;border:1px solid #d4c9b0;border-radius:10px;
  padding:9px 14px;margin-bottom:12px;
}
.ctrl-group{display:flex;align-items:center;gap:5px}
.ctrl-label{font-size:12px;color:#9a8a70;white-space:nowrap}
.btn{
  padding:4px 13px;border-radius:6px;border:1px solid #ccc4b0;
  background:transparent;color:#7a6a52;font-size:13px;cursor:pointer;
  transition:all .12s;font-family:inherit;
}
.btn:hover{border-color:#9a8a70;color:#3a2a10}
.btn.active{background:#2f1d08;border-color:#2f1d08;color:#f5f0e6;font-weight:500}
.divider{width:1px;height:22px;background:#ccc4b0;flex-shrink:0}
.chk-wrap{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  font-size:13px;color:#7a6a52;user-select:none;
}
.chk-wrap input{width:14px;height:14px;accent-color:#2f1d08;cursor:pointer}
.chk-wrap:hover{color:#3a2a10}

/* Legend */
.legend{
  display:flex;align-items:center;gap:8px;font-size:11px;
  color:#9a8a70;margin-bottom:10px;padding:0 2px;flex-wrap:nowrap;
}
.legend-bar{display:flex;gap:1px}
.legend-bar span{display:inline-block;width:20px;height:9px;border-radius:1px}
.legend-note{color:#b0a490;margin-left:8px;white-space:nowrap}

/* Heatmap */
#hm-wrap{
  position:relative;width:100%;background:#ddd5c2;
  border-radius:10px;overflow:hidden;border:1px solid #cec5b0;
}
#hm-stage{position:relative}

/* Sector */
.sec{position:absolute;overflow:hidden;border-radius:3px}
.sec-lbl{
  position:absolute;top:0;left:0;right:0;z-index:2;
  pointer-events:none;
  padding:3px 6px;font-size:11px;font-weight:600;
  color:#1a1208;background:rgba(245,240,230,.90);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.02em;border-bottom:1px solid rgba(0,0,0,.07);
  cursor:pointer;pointer-events:auto;transition:background .12s;
  display:flex;align-items:center;gap:4px;
}
.sec-lbl:hover{background:rgba(245,240,230,.98)}
.sec-lbl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-lbl-pct{font-weight:500;font-size:10px;flex-shrink:0}
.sec-lbl-icon{font-size:9px;opacity:.4;flex-shrink:0}

/* Stock */
.stk{
  position:absolute;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;border-radius:2px;transition:filter .1s;
}
.stk:hover{filter:brightness(1.12);z-index:10}
.stk-code{display:block;font-weight:600;line-height:1.2;text-align:center}
.stk-name{display:block;line-height:1.2;text-align:center;opacity:.8}
.stk-pct{display:block;font-weight:600;line-height:1.25;text-align:center}

/* Tooltip */
#tt{
  position:fixed;background:#fdf9f3;border:1px solid #cec5b0;
  border-radius:10px;padding:12px 16px;font-size:12px;
  pointer-events:none;display:none;z-index:999;min-width:170px;
  box-shadow:0 4px 16px rgba(60,40,10,.12);
}
#tt .tt-h{font-size:14px;font-weight:600;color:#1a1208;margin-bottom:8px}
#tt .tt-r{display:flex;justify-content:space-between;gap:20px;color:#9a8a70;padding:2px 0}
#tt .tt-v{color:#2c2415;font-weight:500}
#tt .tt-up{color:#c01c1c;font-weight:600}
#tt .tt-dn{color:#0d7a28;font-weight:600}
#tt .tt-flat{color:#9a8a70;font-weight:500}

/* Sector Modal */
#sec-modal{
  position:fixed;inset:0;background:rgba(18,12,4,.62);
  z-index:500;display:none;align-items:center;justify-content:center;padding:20px;
}
#sec-modal.open{display:flex}
.modal-box{
  background:#f5f0e6;border-radius:12px;border:1px solid #cec5b0;
  width:100%;max-width:1100px;height:80vh;max-height:720px;
  display:flex;flex-direction:column;overflow:hidden;
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid #d4c9b0;flex-shrink:0;
}
.modal-title{font-size:16px;font-weight:600;color:#1a1208}
.modal-meta{font-size:12px;color:#9a8a70;margin-left:10px}
.modal-close{
  background:none;border:1px solid #ccc4b0;border-radius:6px;
  padding:4px 10px;cursor:pointer;font-size:14px;color:#7a6a52;font-family:inherit;
}
.modal-close:hover{color:#1a1208;border-color:#9a8a70}
.modal-body{flex:1;position:relative;background:#ddd5c2;overflow:hidden}

/* Sub-sector labels inside modal */
.modal-sub-lbl{
  position:absolute;top:0;left:0;right:0;height:17px;z-index:2;
  display:flex;align-items:center;gap:5px;
  padding:0 6px;font-size:10px;font-weight:600;
  color:#1a1208;background:rgba(245,240,230,.93);
  white-space:nowrap;overflow:hidden;
  border-bottom:1px solid rgba(0,0,0,.06);letter-spacing:.01em;
}
.modal-sub-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.modal-sub-cnt{opacity:.5;font-weight:400;flex-shrink:0}

/* Placeholder */
.placeholder{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:400px;gap:12px;color:#9a8a70;font-size:14px;
}
.placeholder code{
  background:#ede7d9;border:1px solid #ccc4b0;border-radius:6px;
  padding:6px 14px;font-size:13px;color:#5a4228;font-family:monospace;
}

/* Footer */
.footer{margin-top:16px;font-size:11px;color:#b0a490;text-align:center;line-height:1.9}
.footer a{color:#7a6a52;text-decoration:none}
.footer a:hover{color:#3a2a10}

/* Intraday badge */
#intraday-badge{
  display:none;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;
  font-size:11px;font-weight:600;color:#c01c1c;
  background:rgba(192,28,28,.08);border:1px solid rgba(192,28,28,.3);
  border-radius:10px;padding:1px 8px;cursor:pointer;
  animation:pulse-border 2s ease-in-out infinite;
}
#intraday-badge:hover{background:rgba(192,28,28,.15)}
@keyframes pulse-border{0%,100%{border-color:rgba(192,28,28,.3)}50%{border-color:rgba(192,28,28,.7)}}
/* 收盤後暫存 13:30 狀態：靜態灰金色，不跳動 */
#intraday-badge.closed{color:#9a7a1c;background:rgba(176,140,24,.08);border-color:rgba(176,140,24,.35);animation:none}
#intraday-badge.closed:hover{background:rgba(176,140,24,.15)}
#intraday-badge.closed .intraday-dot{display:none}
.intraday-dot{width:5px;height:5px;border-radius:50%;background:#c01c1c;flex-shrink:0;
  animation:pulse-dot 1.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">

<!-- Sector drill-down modal -->
<div id="sec-modal" onclick="if(event.target===this)closeSectorModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div style="display:flex;align-items:baseline;gap:10px">

<!-- Tooltip -->
<div id="tt">
  <div class="tt-h" id="tt-h"></div>
  <div class="tt-r"><span>代號</span><span class="tt-v" id="tt-c"></span></div>

  <div class="tt-r"><span id="tt-vlbl">成交值</span><span class="tt-v" id="tt-v"></span></div>
  <div class="tt-r"><span>產業</span><span class="tt-v" id="tt-s"></span></div>
</div>

<script>
  (function(){
    const d = new Date();
    const v = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    document.write('<scr'+'ipt src="data/chart_data.js?v='+v+'"><\/scr'+'ipt>');

</script>
<script>
(function () {
  const stage   = document.getElementById('hm-stage');
  const ttEl    = document.getElementById('tt');
  let currentPeriod = '1d';
  let currentMarket = 'tse';
  let sizeMetric    = 'mktcap';  // 'mktcap' | 'value'
  let exclTSMC  = false;
  const GAP   = 2;
  const LBL_H = 18;

  // ── sub-sector map (code → sub-name) ────────────────
  let SUBSECTOR_MAP = {};
  fetch('data/subsector_map.json')
    .then(r => r.json())
    .then(data => {
      Object.entries(data).forEach(([key, codes]) => {
        const name = key.includes('－') ? key.split('－')[1] : key;
        codes.forEach(c => { SUBSECTOR_MAP[c] = name; });
      });
    })
    .catch(() => {});

  // ── utils ────────────────────────────────────────────
  function fv(v) {
    if (v >= 1e12) return (v / 1e12).toFixed(2) + '兆';
    if (v >= 1e8)  return (v / 1e8).toFixed(1) + '億';
    if (v >= 1e4)  return (v / 1e4).toFixed(0) + '萬';
    return v + '';
  }

  function stockColor(p, maxPct) {
    const scale = Math.max(3, maxPct);
    const t = Math.max(-1, Math.min(1, p / scale));
    if (t > 0) {
      // 漲：淺粉（小漲）→ 深紅（大漲）
      if (t < 0.2) return { bg: '#f5c0c0', tx: '#7a1010' };
      if (t < 0.4) return { bg: '#e87070', tx: '#fff' };
      if (t < 0.6) return { bg: '#c82020', tx: '#fff' };
      if (t < 0.8) return { bg: '#8b1010', tx: '#ffc8c8' };
      return { bg: '#600808', tx: '#ffb0b0' };
    } else if (t < 0) {
      // 跌：淺綠（小跌）→ 深綠（大跌）
      const a = Math.abs(t);
      if (a < 0.2) return { bg: '#b8e8c0', tx: '#0a4018' };
      if (a < 0.4) return { bg: '#6cc878', tx: '#fff' };
      if (a < 0.6) return { bg: '#1da838', tx: '#fff' };
      if (a < 0.8) return { bg: '#0a6820', tx: '#a0e8b0' };
      return { bg: '#054018', tx: '#80d890' };
    }
    return { bg: '#b5a888', tx: '#3a2a10' };
  }

  // ── squarified treemap ───────────────────────────────
  function squarify(items, x, y, w, h) {
    if (!items.length) return [];
    // squarified treemap 需輸入由大到小排序，否則大塊會排到小塊之後
    items = [...items].sort((a, b) => b._a - a._a);
    const tot = items.reduce((s, d) => s + d._a, 0);
    const res = [];
    let rem = [...items], rx = x, ry = y, rw = w, rh = h, rt = tot;
    while (rem.length) {
      const wide = rw >= rh;
      let row = [], rs = 0, bw = Infinity;
      for (let i = 0; i < rem.length; i++) {
        row.push(rem[i]); rs += rem[i]._a;
        const rl = (wide ? rw : rh) * (rs / rt);
        let worst = 0;
        for (const r of row) {
          const f = r._a / rs, cw = f * (wide ? rh : rw);
          worst = Math.max(worst, Math.max(rl / cw, cw / rl));
        }
        if (worst > bw) { row.pop(); break; }
        bw = worst;
      }
      const rs2 = row.reduce((s, d) => s + d._a, 0);
      const rl  = (wide ? rw : rh) * (rs2 / rt);
      let cx = rx, cy = ry;
      for (const item of row) {
        const f = item._a / rs2;
        const cw = wide ? rl : rw * f, ch = wide ? rh * f : rl;
        res.push({ ...item, x: cx, y: cy, w: cw, h: ch });
        if (wide) cy += ch; else cx += cw;
      }
      if (wide) { rx += rl; rw -= rl; } else { ry += rl; rh -= rl; }
      rem = rem.filter(d => !row.includes(d)); rt -= rs2;
    }
    return res;
  }

  // ── stock block HTML (font scales with block size) ───
  function stkHtml(stk, sw, sh) {
    if (sw < 12 || sh < 8) return '';
    const base = Math.min(sw / 4.2, sh / 2.6, 18);
    const fs1  = Math.max(8, Math.min(17, base));
    const fs2  = Math.max(7, Math.min(13, base * 0.78));
    let html = '';
    if (sw > 30 && sh > 20) html += `<span class="stk-code" style="font-size:${fs1}px">${stk.c}</span>`;
    if (sw > 56 && sh > 42) html += `<span class="stk-name" style="font-size:${fs2}px">${stk.n}</span>`;
    if (sw > 16 && sh > 10) {
      const s = stk.p > 0 ? '+' : '';
      html += `<span class="stk-pct" style="font-size:${fs1}px">${s}${stk.p.toFixed(2)}%</span>`;
    }
    return html;
  }

  // ── tooltip ──────────────────────────────────────────
  function showTT(stk, secName) {
    const pl = { '1d':'當日','3d':'近3日','5d':'近5日','20d':'近20日','60d':'近60日' }[currentPeriod] || currentPeriod;
    document.getElementById('tt-h').textContent  = stk.n;
    document.getElementById('tt-c').textContent  = stk.c;
    document.getElementById('tt-cl').textContent = stk.cl ? stk.cl.toFixed(2) : '—';
    document.getElementById('tt-plbl').textContent = pl + '漲跌';
    const tp = document.getElementById('tt-p');
    tp.textContent = (stk.p > 0 ? '+' : '') + stk.p.toFixed(2) + '%';
    tp.className = stk.p > 0.1 ? 'tt-up' : stk.p < -0.1 ? 'tt-dn' : 'tt-flat';
    if (sizeMetric === 'mktcap') {
      document.getElementById('tt-vlbl').textContent = '市值';
      document.getElementById('tt-v').textContent = stk.m ? fv(stk.m) : '—';
    } else {
      document.getElementById('tt-vlbl').textContent = pl + '成交值';
      document.getElementById('tt-v').textContent = fv(stk.v);
    }
    document.getElementById('tt-s').textContent = secName;
    ttEl.style.display = 'block';
  }
  function moveTT(e) {
    ttEl.style.left = Math.min(e.clientX + 16, window.innerWidth  - 205) + 'px';
    ttEl.style.top  = Math.min(e.clientY - 10, window.innerHeight - 165) + 'px';
  }
  function hideTT() { ttEl.style.display = 'none'; }

  // ── stock block builder ──────────────────────────────
  function buildStkEl(stk, sw, sh, secName, maxAbsPct) {
    const { bg, tx } = stockColor(stk.p, maxAbsPct);
    const se = document.createElement('div');
    se.className = 'stk';
    se.style.cssText = `left:${stk.x+.4}px;top:${stk.y+.4}px;width:${sw}px;height:${sh}px;background:${bg};color:${tx}`;
    se.innerHTML = stkHtml(stk, sw, sh);
    se.addEventListener('mouseenter', () => showTT(stk, secName));
    se.addEventListener('mousemove',  moveTT);
    se.addEventListener('mouseleave', hideTT);
    return se;
  }

  // ── sector modal ─────────────────────────────────────
  function openSectorModal(sec, maxAbsPct) {
    const modal  = document.getElementById('sec-modal');
    const body   = document.getElementById('modal-body');
    const sk     = sizeMetric === 'mktcap' ? 'm' : 'v';
    const szLabel = sizeMetric === 'mktcap' ? '市值' : '成交值';

    const totalSz = sec.stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
    const avgP    = totalSz > 0
      ? sec.stocks.reduce((s, i) => s + i.p * (i[sk] || i.v), 0) / totalSz
      : (sec._avgPct || 0);
    document.getElementById('modal-title').textContent = sec.name;
    document.getElementById('modal-meta').textContent  =
      `${sec.stocks.length} 支　${szLabel} ${fv(totalSz)}　均 ${avgP > 0 ? '+' : ''}${avgP.toFixed(2)}%`;
    body.innerHTML = '';
    modal.classList.add('open');

    requestAnimationFrame(() => {
      const W = body.clientWidth  || 800;
      const H = body.clientHeight || 500;

      // Group stocks by sub-sector
      const groups = {};
      sec.stocks.forEach(stk => {
        const sub = SUBSECTOR_MAP[stk.c] || '其他';
        if (!groups[sub]) groups[sub] = [];
        groups[sub].push(stk);
      });

      const namedKeys = Object.keys(groups).filter(k => k !== '其他');
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:relative;width:${W}px;height:${H}px`;

      if (namedKeys.length < 2) {
        // Flat view — no meaningful sub-sector data
        const tot = sec.stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
        if (tot > 0) {
          const items = sec.stocks.map(i => ({ ...i, _a: ((i[sk] || i.v) / tot) * W * H }));
          squarify(items, 0, 0, W, H).forEach(stk => {
            const sw = stk.w - 1, sh = stk.h - 1;
            const se = buildStkEl(stk, sw, sh, sec.name, maxAbsPct);
            se.style.left = (stk.x + .5) + 'px'; se.style.top = (stk.y + .5) + 'px';
            se.style.width = sw + 'px'; se.style.height = sh + 'px';
            wrap.appendChild(se);
          });
        }
        body.appendChild(wrap);
        return;
      }

      // Two-level grouped treemap
      const SUB_LBL_H = 17;
      const SUB_GAP   = 2;

      const subList = Object.entries(groups).map(([name, stocks]) => {
        const tv = stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
        const ap = tv > 0 ? stocks.reduce((s, i) => s + i.p * (i[sk] || i.v), 0) / tv : 0;
        return { name, stocks, _sz: tv, avgPct: ap };
      }).filter(g => g._sz > 0).sort((a, b) => b._sz - a._sz);

      const szAll = subList.reduce((s, g) => s + g._sz, 0);
      subList.forEach(g => { g._a = (g._sz / szAll) * W * H; });

      squarify(subList, 0, 0, W, H).forEach(sub => {
        const sw = sub.w - SUB_GAP, sh = sub.h - SUB_GAP;
        const subEl = document.createElement('div');
        subEl.style.cssText = `position:absolute;left:${sub.x+SUB_GAP/2}px;top:${sub.y+SUB_GAP/2}px;`
          + `width:${sw}px;height:${sh}px;background:#ddd5c2;`
          + `border:1px solid rgba(0,0,0,.08);border-radius:3px;overflow:hidden`;

        // Sub-sector label
        const sign = sub.avgPct > 0 ? '+' : '';
        const lc = sub.avgPct > 0.3 ? '#c01818' : sub.avgPct < -0.3 ? '#0a6820' : '#9a8a70';
        const lbl = document.createElement('div');
        lbl.className = 'modal-sub-lbl';
        lbl.innerHTML = `<span class="modal-sub-name">${sub.name}</span>`
          + `<span style="color:${lc};flex-shrink:0">${sign}${sub.avgPct.toFixed(2)}%</span>`
          + `<span class="modal-sub-cnt">${sub.stocks.length}支</span>`;
        subEl.appendChild(lbl);

        // Stocks within this sub-sector
        const innerH = sh - SUB_LBL_H;
        if (sub.stocks.length > 0 && innerH > 4 && sw > 4) {
          const stot = sub.stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
          if (stot > 0) {
            const sItems = sub.stocks.map(i => ({ ...i, _a: ((i[sk] || i.v) / stot) * sw * innerH }));
            squarify(sItems, 0, SUB_LBL_H, sw, innerH).forEach(stk => {
              const esw = stk.w - .8, esh = stk.h - .8;
              if (esw < 4 || esh < 4) return;
              const se = buildStkEl(stk, esw, esh, sub.name, maxAbsPct);
              se.style.left = (stk.x + .4) + 'px'; se.style.top = (stk.y + .4) + 'px';
              se.style.width = esw + 'px'; se.style.height = esh + 'px';
              subEl.appendChild(se);
            });
          }
        }
        wrap.appendChild(subEl);
      });
      body.appendChild(wrap);
    });
  }

  window.closeSectorModal = function () {
    document.getElementById('sec-modal').classList.remove('open');
  };

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSectorModal(); });

  // ── main render ──────────────────────────────────────
  function render() {
    stage.innerHTML = '';
    hideTT();

    if (typeof CHART_DATA === 'undefined') {
      stage.innerHTML = `<div class="placeholder">
        <div>找不到資料檔案，請先執行：</div>
        <code>python3 fetch_data.py</code></div>`;
      document.getElementById('hdr-sub').textContent = '尚無資料';
      return;
    }

    const periodData = CHART_DATA[currentPeriod];
    const data = periodData && periodData[currentMarket];
    if (!data) {
      const marketLabel = { tse:'上市', otc:'上櫃', all:'合併' }[currentMarket];
      stage.innerHTML = `<div class="placeholder">
        <div>${currentPeriod} ${marketLabel}資料不足</div>
        <code>python3 fetch_data.py</code></div>`;
      return;
    }

    const sk = sizeMetric === 'mktcap' ? 'm' : 'v';  // size key per stock

    let sectors = JSON.parse(JSON.stringify(data.sectors));

    // 盤中即時／收盤暫存：今日資料有效時，覆蓋所有週期的漲跌幅
    // 1d：直接用即時漲跌幅；多日：從靜態資料反推基期股價，算到今日收盤的真實幅度
    // 收盤後到正式資料更新前，沿用 13:30 最後狀態；跨日則自動失效
    const intradayActive = !!(intradayData && intradayStamp === twDateStr());
    if (intradayActive) {
      sectors = sectors.map(sec => {
        const stocks = sec.stocks.map(stk => {
          const id = intradayData[stk.c];
          if (!id) return stk;
          if (currentPeriod === '1d') {
            return { ...stk, p: id.p, v: id.v > 0 ? id.v : stk.v };
          }
          // 多日週期：從「靜態末日收盤 + 靜態漲跌幅」反推基期收盤，再算到今日即時收盤
          const baseCl = stk.p !== 0 ? stk.cl / (1 + stk.p / 100) : stk.cl;
          const newPct = baseCl > 0 ? Math.round((id.z / baseCl - 1) * 10000) / 100 : id.p;
          return { ...stk, p: newPct };  // 多日不動 v，保留累積成交量維持格子大小
        });
        const tv = stocks.reduce((s, i) => s + (i.v || 0), 0);
        const avgPct = tv > 0
          ? stocks.reduce((s, i) => s + i.p * (i.v || 0), 0) / tv
          : sec.avgPct;
        return { ...sec, stocks, totalValue: tv, avgPct };
      });
    }

    if (exclTSMC) {
      sectors = sectors.map(sec => {
        const stocks = sec.stocks.filter(s => s.c !== '2330');
        const tv = stocks.reduce((s, i) => s + i.v, 0);
        return { ...sec, stocks, totalValue: tv,
          avgPct: tv > 0 ? stocks.reduce((s, i) => s + i.p * i.v, 0) / tv : 0 };
      }).filter(sec => sec.stocks.length > 0 && sec.totalValue > 0);
    }

    // Compute display size per sector (market cap or trade value)
    sectors = sectors.map(sec => {
      const totalSz = sec.stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
      const avgPct  = totalSz > 0
        ? sec.stocks.reduce((s, i) => s + i.p * (i[sk] || i.v), 0) / totalSz
        : sec.avgPct;
      return { ...sec, _sz: totalSz, _avgPct: avgPct };
    }).filter(s => s._sz > 0);
    sectors.sort((a, b) => b._sz - a._sz);

    const totalSz    = sectors.reduce((s, d) => s + d._sz, 0);
    const maxAbsPct  = Math.max(5, ...sectors.flatMap(sec => sec.stocks.map(s => Math.abs(s.p))));
    const W = stage.parentElement.clientWidth || 900;
    const H = Math.max(480, Math.round(W * 0.58));
    stage.style.width  = W + 'px';
    stage.style.height = H + 'px';

    const secItems = sectors.map(d => ({ ...d, _a: (d._sz / totalSz) * W * H }));
    squarify(secItems, 0, 0, W, H).forEach(sec => {
      const el = document.createElement('div');
      el.className = 'sec';
      el.style.cssText = `left:${sec.x + GAP/2}px;top:${sec.y + GAP/2}px;width:${sec.w - GAP}px;height:${sec.h - GAP}px;background:#e0d9cc;border:1px solid rgba(0,0,0,.06)`;

      // Sector label (clickable)
      const sign = sec._avgPct > 0 ? '+' : '';
      const secColor = sec._avgPct > 0.3 ? '#b01818' : sec._avgPct < -0.3 ? '#0a6820' : '#9a8a70';
      const lbl = document.createElement('div');
      lbl.className = 'sec-lbl';
      lbl.title = `點擊展開 ${sec.name}`;
      lbl.innerHTML = `<span class="sec-lbl-name">${sec.name}</span>
        <span class="sec-lbl-pct" style="color:${secColor}">${sign}${sec._avgPct.toFixed(2)}%</span>
        <span class="sec-lbl-icon">↗</span>`;
      lbl.addEventListener('click', () => openSectorModal(sec, maxAbsPct));
      el.appendChild(lbl);

      // Stocks treemap
      const iw = sec.w - GAP, ih = sec.h - GAP;
      const st = sec.stocks.reduce((s, i) => s + (i[sk] || i.v), 0);
      const si = sec.stocks.map(i => ({ ...i, _a: ((i[sk] || i.v) / st) * iw * (ih - LBL_H) }));
      squarify(si, 0, LBL_H, iw, ih - LBL_H).forEach(stk => {
        const sw = stk.w - .8, sh = stk.h - .8;
        const se = buildStkEl(stk, sw, sh, sec.name, maxAbsPct);
        el.appendChild(se);
      });

      stage.appendChild(el);
    });

    // Update header & legend
    const totalStocks = sectors.reduce((s, d) => s + d.stocks.length, 0);
    const fmt = d => d.replace(/(\d{4})(\d{2})(\d{2})/, '$1/$2/$3');
    // 盤中／收盤暫存啟用時，以今日為結束日期
    const today = twDateStr();
    const effectiveEnd  = intradayActive ? today : data.toDate;
    const effectiveFrom = (intradayActive && currentPeriod === '1d') ? today : data.fromDate;
    const rangeText = effectiveFrom === effectiveEnd
      ? fmt(effectiveEnd)
      : `${fmt(effectiveFrom)} – ${fmt(effectiveEnd)}`;
    const periodDays = { '1d':1,'3d':3,'5d':5,'20d':20,'60d':60 }[currentPeriod] || 1;
    const shortfall  = periodDays - data.actualDays;
    const shortNote  = shortfall > 0 ? `　⚠️ 資料僅 ${data.actualDays} 天（還需 ${shortfall} 個交易日）` : '';
    const mktLabel   = { tse:'上市', otc:'上櫃', all:'上市＋上櫃' }[currentMarket];
    const szLabel    = sizeMetric === 'mktcap' ? '市值' : '成交值';

    const intradayNote = intradayActive
      ? (isMarketOpen() ? '　🟢 盤中即時' : '　🟡 13:30 收盤（待資料更新）')
      : '';
    document.getElementById('hdr-sub').textContent =
      `${mktLabel}　${rangeText}　${totalStocks} 支　${sectors.length} 個產業${exclTSMC ? '（已排除台積電）' : ''}${shortNote}${intradayNote}`;
    document.getElementById('stat-inline').textContent =
      `總${szLabel} ${fv(totalSz)}\n資料庫 ${CHART_DATA.totalDays} 個交易日`;
    document.getElementById('updated-at').textContent = CHART_DATA.updatedAt || '—';
    document.getElementById('size-note').textContent =
      `區塊大小 = ${szLabel}　點擊產業標籤可展開`;
  }

  // ── event listeners ──────────────────────────────────
  document.querySelectorAll('[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sizeMetric = btn.dataset.size;
      render();
    });
  });

  document.querySelectorAll('[data-market]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-market]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMarket = btn.dataset.market;
      render();
    });
  });

  document.querySelectorAll('[data-period]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      render();
    });
  });

  document.getElementById('excl-tsmc').addEventListener('change', e => {
    exclTSMC = e.target.checked;
    render();
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 250);
  });

  // ── Intraday realtime mode ───────────────────────────
  let intradayData   = null;  // { code: { p, v, z } }
  let intradayTimer  = null;
  let intradayStamp  = null;  // 最後抓到盤中資料的台灣日期 YYYYMMDD（收盤後暫存判斷用）

  function twNow() {
    // 回傳台灣時間的 Date（UTC+8）
    return new Date(Date.now() + 8 * 3600000);
  }

  function twDateStr() {
    const d = twNow();
    return `${d.getUTCFullYear()}${String(d.getUTCMonth() + 1).padStart(2, '0')}${String(d.getUTCDate()).padStart(2, '0')}`;
  }

  // 收盤暫存：把盤中資料存進 localStorage，收盤後（含重新整理／新分頁）沿用 13:30 狀態
  const LS_KEY = 'heatmap_intraday';
  function saveIntradayCache() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ stamp: intradayStamp, data: intradayData })); } catch (e) {}
  }
  function loadIntradayCache() {
    try {
      const o = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (o && o.stamp === twDateStr() && o.data) { intradayData = o.data; intradayStamp = o.stamp; return true; }
    } catch (e) {}
    return false;
  }
  function showClosedBadge() {
    const badge = document.getElementById('intraday-badge');
    badge.style.display = 'inline-flex';
    badge.classList.add('closed');
    document.getElementById('intraday-label').textContent = '13:30 收盤';
    document.getElementById('intraday-time').textContent = '已暫存';
  }

  function isMarketOpen() {
    const d = twNow();
    const day = d.getUTCDay();        // 0=Sun 6=Sat
    if (day === 0 || day === 6) return false;
    const mins = d.getUTCHours() * 60 + d.getUTCMinutes();
    return mins >= 540 && mins < 810; // 09:00–13:30
  }

  function allStockCodes() {
    // 從 CHART_DATA 1d 取出所有 {code, market} 清單
    if (typeof CHART_DATA === 'undefined') return { tse: [], otc: [] };
    const pd = CHART_DATA['1d'];
    if (!pd) return { tse: [], otc: [] };
    const tse = [], otc = [];
    ['tse', 'otc'].forEach(mkt => {
      const d = pd[mkt];
      if (!d || !d.sectors) return;
      d.sectors.forEach(sec => sec.stocks.forEach(s => {
        (mkt === 'tse' ? tse : otc).push(s.c);
      }));
    });
    return { tse, otc };
  }

  // TWSE mis API 不送 CORS header，瀏覽器直連會被擋。
  // 優先走同源 Vercel proxy（/api/quote，穩定、不快取）；
  // 非 Vercel 環境（GitHub Pages／本機）自動退回公開 proxy。
  let useSameOrigin = true;
  async function fetchBatch(codes, market) {
    // TWSE mis API 支援 tse_xxxx.tw 和 otc_xxxx.tw 混合查詢
    const exCh = codes.map(c => `${market}_${c}.tw`).join('|');

    if (useSameOrigin) {
      try {
        const r = await fetch(`/api/quote?ex_ch=${encodeURIComponent(exCh)}&_=${Date.now()}`, { cache: 'no-store' });
        if (r.ok) {
          const j = await r.json();
          if (j && j.msgArray) return j.msgArray;
        }
        throw new Error('same-origin proxy unavailable: ' + r.status);
      } catch (e) {
        useSameOrigin = false; // 之後一律改用公開 proxy
      }
    }

    const target = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${exCh}&json=1&delay=0&_=${Date.now()}`;
    const url = 'https://corsproxy.io/?url=' + encodeURIComponent(target);
    const r = await fetch(url, { cache: 'no-store' });
    const json = await r.json();
    return json.msgArray || [];
  }

  // 取現價（價格須 > 0；API 常以 "-" 或 "0.0000" 表示無報價）
  // 優先成交價 z → 買賣最佳一檔中值 → 當日高安中值（漲跌停鎖死時備援）
  function livePrice(item) {
    const pos = v => { const n = parseFloat(v); return (isFinite(n) && n > 0) ? n : NaN; };
    const z = pos(item.z);
    if (isFinite(z)) return z;
    const bid = pos((item.b || '').split('_')[0]);
    const ask = pos((item.a || '').split('_')[0]);
    if (isFinite(bid) && isFinite(ask)) return (bid + ask) / 2;
    if (isFinite(bid)) return bid;  // 只有買盤（接近漲停）
    if (isFinite(ask)) return ask;  // 只有賣盤（接近跌停）
    // 無成交價也無有效買賣盤 → 漲跌停鎖死，o=h=l=鎖死價，用高安中值推估
    const h = pos(item.h), l = pos(item.l), o = pos(item.o);
    if (isFinite(h) && isFinite(l)) return (h + l) / 2;
    return isFinite(h) ? h : (isFinite(l) ? l : (isFinite(o) ? o : NaN));
  }

  async function fetchAllIntraday() {
    const { tse, otc } = allStockCodes();
    const BATCH = 150;
    const map = {};
    let okBatches = 0;
    let latestApiDate = null; // 追蹤 mis API 實際回傳的日期（d 欄位）

    async function processBatches(codes, market) {
      for (let i = 0; i < codes.length; i += BATCH) {
        let items;
        try {
          items = await fetchBatch(codes.slice(i, i + BATCH), market);
        } catch (e) {
          console.warn('盤中批次失敗，跳過:', market, i, e);
          continue; // 單批失敗不影響其餘批次
        }
        okBatches++;
        items.forEach(item => {
          const price = livePrice(item);    // 現價（含中值備援）
          const y = parseFloat(item.y);     // 昨收
          const vol = parseFloat(item.v);   // 累積成交量（張）
          if (!isFinite(price) || !isFinite(y) || y === 0) return;
          map[item.c] = {
            p: (price - y) / y * 100,                       // 漲跌幅 %
            v: isFinite(vol) ? vol * price * 1000 : 0,      // 估算累計成交值（NTD）
            z: price                                        // 現價
          };
          // 從 d 欄位追蹤最新的 API 資料日期（格式 YYYYMMDD）
          if (item.d && (!latestApiDate || item.d > latestApiDate)) {
            latestApiDate = item.d;
          }
        });
      }
    }

    await processBatches(tse, 'tse');
    await processBatches(otc, 'otc');

    // 全部批次都失敗（例如 proxy 掛掉）→ 保留前次資料，不要清空
    if (okBatches === 0 || Object.keys(map).length === 0) {
      console.warn('盤中資料更新失敗：所有批次皆無回應');
      return false;
    }

    // 盤後呼叫時：mis API 仍回傳最終成交價，但需確認日期是今天
    // 若 API 回傳的是前一天資料（隔日凌晨後 API 重置）→ 放棄，不覆蓋快取
    const today = twDateStr();
    if (latestApiDate && latestApiDate !== today) {
      console.warn(`mis API 日期 ${latestApiDate} 非今日 ${today}，放棄`);
      return false;
    }

    intradayData = map;
    intradayStamp = today;
    saveIntradayCache();

    // 更新時間戳（盤中態 badge）
    const d = twNow();
    const ts = [d.getUTCHours(), d.getUTCMinutes(), d.getUTCSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
    const badge = document.getElementById('intraday-badge');
    badge.classList.remove('closed');
    document.getElementById('intraday-label').textContent = '盤中即時';
    document.getElementById('intraday-time').textContent = ts;

    render();
    return true;
  }

  function startIntraday() {
    if (intradayTimer) return; // 已在執行
    document.getElementById('intraday-badge').style.display = 'inline-flex';
    fetchAllIntraday();
    intradayTimer = setInterval(fetchAllIntraday, 60000);
  }

  // 收盤：停止輪詢，但「保留」最後盤中資料，畫面停在 13:30 收盤狀態直到資料更新
  function stopIntraday() {
    clearInterval(intradayTimer);
    intradayTimer = null;
    // 若今天曾抓到盤中資料 → 切換為收盤暫存態（不清空 intradayData）
    if (intradayData && intradayStamp === twDateStr()) {
      showClosedBadge();
      render();
    } else {
      // 非當日暫存（例如隔天開盤前）→ 清空回收盤資料
      intradayData = null;
      intradayStamp = null;
      document.getElementById('intraday-badge').style.display = 'none';
      render();
    }
  }

  // 手動刷新按鈕
  document.getElementById('intraday-badge').addEventListener('click', fetchAllIntraday);

  // ── init ────────────────────────────────────────────
  if (typeof CHART_DATA === 'undefined') {
    stage.innerHTML = `<div class="placeholder">
      <div style="font-size:16px;color:#7a6a52">尚無資料</div>
      <div>請先執行：</div>
      <code>python3 fetch_data.py</code>
      <div style="font-size:11px;color:#b0a490;margin-top:4px">之後重新開啟此頁面即可看到熱力圖</div>
    </div>`;
    document.getElementById('hdr-sub').textContent = '請先執行 fetch_data.py';
  } else {
    render();
    // 若盤中時間自動啟動即時模式；否則嘗試載入今天 13:30 的收盤暫存
    if (isMarketOpen()) {
      startIntraday();
    } else if (loadIntradayCache()) {
      showClosedBadge();
      render();
    } else {
      // 盤後首次載入（無快取）：mis API 收盤後仍持續提供當日最終成交價，
      // 直接抓一次收盤快照並存入 localStorage，下次載入就不需要再抓
      const day = twNow().getUTCDay();
      if (day !== 0 && day !== 6) { // 週末不嘗試
        fetchAllIntraday().then(ok => {
          if (ok) showClosedBadge();
        }).catch(() => {});
      }
    }
    // 每分鐘檢查是否進入/離開盤中時間
    setInterval(() => {
      if (isMarketOpen() && !intradayTimer) startIntraday();
      if (!isMarketOpen() && intradayTimer) stopIntraday();
    }, 60000);
  }
})();
</script>
</body>
</html>
