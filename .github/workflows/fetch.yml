name: 每日更新台股資料

on:
  schedule:
    # 三個時段自動補抓（若當天資料已存在則跳過）
    - cron: '35 7 * * 1-5'   # UTC 07:35 = 台灣 15:35（第一次）
    - cron: '0 9 * * 1-5'    # UTC 09:00 = 台灣 17:00（第二次）
    - cron: '0 11 * * 1-5'   # UTC 11:00 = 台灣 19:00（第三次）
  workflow_dispatch:
    # 允許手動在 GitHub 網頁觸發

permissions:
  contents: write   # 允許 workflow 推送資料回 repo

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整歷史才能正確 push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 確認是否需要更新
        id: check
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y%m%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          if [ -f "data/${TODAY}.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "今日資料已存在（${TODAY}），跳過抓取。"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "尚無今日資料（${TODAY}），開始抓取。"
          fi

      - name: 抓取台股資料
        if: steps.check.outputs.skip != 'true'
        run: python3 fetch_data.py

      - name: 提交並推送資料
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          # 有變動才 commit，避免空 commit
          git diff --staged --quiet || git commit -m "每日更新 $(date -u +'%Y-%m-%d')"
          git push
